<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Solar System, Right Now</title>
  <meta name="description" content="A live orrery: the eight planets drawn at their true positions, computed from JPL orbital elements. Scrub time from 1800 to 2050.">
  <meta name="theme-color" content="#05070d">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🪐</text></svg>">
</head>
<body>
<style>
  :root {
    color-scheme: dark;
    --bg: #05070d;
    --ink: #e9e5d6;
    --muted: #8a8fa3;
    --faint: #4a4f63;
    --accent: #e2b04a;
    --line: rgba(138, 143, 163, 0.22);
    --dock-bg: rgba(10, 13, 22, 0.72);
    --card-bg: rgba(10, 13, 22, 0.82);
    --font-display: "Didot", "Bodoni 72", "Bodoni MT", "Playfair Display", Georgia, serif;
    --font-body: "Avenir Next", "Avenir", "Seravek", "Gill Sans", "Segoe UI", system-ui, sans-serif;
    --font-mono: "SF Mono", "Cascadia Code", "JetBrains Mono", Menlo, ui-monospace, monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  .stage {
    position: fixed;
    inset: 0;
    background: var(--bg);
    font-family: var(--font-body);
    color: var(--ink);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  #sky {
    position: absolute;
    inset: 0;
    display: block;
    cursor: grab;
    touch-action: none;
  }
  #sky.dragging { cursor: grabbing; }
  #sky.hovering { cursor: pointer; }

  /* ---------- time dock ---------- */
  .dock {
    position: absolute;
    left: 50%;
    bottom: clamp(14px, 3vh, 30px);
    transform: translateX(-50%);
    width: min(680px, calc(100vw - 24px));
    background: var(--dock-bg);
    border: 1px solid rgba(138, 143, 163, 0.18);
    border-radius: 14px;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    padding: 12px 16px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .dock .scrub-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .scrub-row .year-mark {
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--faint);
    letter-spacing: 0.05em;
    flex: none;
  }
  #scrub {
    flex: 1;
    appearance: none;
    -webkit-appearance: none;
    height: 22px;
    background: transparent;
    cursor: pointer;
  }
  #scrub::-webkit-slider-runnable-track {
    height: 2px;
    background: var(--line);
    border-radius: 1px;
  }
  #scrub::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 13px;
    height: 13px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    margin-top: -5.5px;
    box-shadow: 0 0 8px rgba(226, 176, 74, 0.55);
  }
  #scrub::-moz-range-track {
    height: 2px;
    background: var(--line);
    border-radius: 1px;
  }
  #scrub::-moz-range-thumb {
    width: 13px;
    height: 13px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    box-shadow: 0 0 8px rgba(226, 176, 74, 0.55);
  }

  .dock .controls-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .btn {
    font-family: var(--font-body);
    font-size: 12.5px;
    font-weight: 500;
    letter-spacing: 0.03em;
    color: var(--ink);
    background: rgba(138, 143, 163, 0.10);
    border: 1px solid rgba(138, 143, 163, 0.22);
    border-radius: 8px;
    padding: 6px 12px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    white-space: nowrap;
  }
  .btn:hover { background: rgba(138, 143, 163, 0.20); }
  .btn:focus-visible, #scrub:focus-visible, .seg button:focus-visible, #dateInput:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }
  .btn.primary {
    color: #0a0d16;
    background: var(--accent);
    border-color: var(--accent);
    font-weight: 600;
    min-width: 74px;
  }
  .btn.primary:hover { background: #edc063; }

  #dateInput {
    font-family: var(--font-mono);
    font-size: 12.5px;
    letter-spacing: 0.04em;
    color: var(--ink);
    background: transparent;
    border: 1px solid rgba(138, 143, 163, 0.22);
    border-radius: 8px;
    padding: 5px 9px;
    cursor: pointer;
  }

  .seg {
    display: flex;
    border: 1px solid rgba(138, 143, 163, 0.22);
    border-radius: 8px;
    overflow: hidden;
  }
  .seg button {
    font-family: var(--font-mono);
    font-size: 10.5px;
    letter-spacing: 0.04em;
    color: var(--muted);
    background: transparent;
    border: none;
    border-right: 1px solid rgba(138, 143, 163, 0.16);
    padding: 6px 9px;
    cursor: pointer;
    transition: color 0.15s, background 0.15s;
  }
  .seg button:last-child { border-right: none; }
  .seg button:hover { color: var(--ink); }
  .seg button[aria-pressed="true"] {
    color: #0a0d16;
    background: var(--muted);
    font-weight: 700;
  }
  .seg.views button[aria-pressed="true"] {
    background: var(--accent);
  }

  .dock-divider {
    width: 1px;
    height: 20px;
    background: rgba(138, 143, 163, 0.22);
    flex: none;
  }

  /* ---------- planet card ---------- */
  .card {
    position: absolute;
    top: clamp(16px, 3vh, 36px);
    right: clamp(14px, 2.5vw, 32px);
    width: min(300px, calc(100vw - 28px));
    background: var(--card-bg);
    border: 1px solid rgba(138, 143, 163, 0.20);
    border-radius: 14px;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    padding: 18px 20px 20px;
    transform: translateX(16px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.22s ease, transform 0.22s ease;
  }
  .card.open {
    transform: translateX(0);
    opacity: 1;
    pointer-events: auto;
  }
  .card .card-head {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 2px;
  }
  .card .symbol {
    font-size: 20px;
    line-height: 1;
    flex: none;
  }
  .card h2 {
    font-family: var(--font-display);
    font-style: italic;
    font-weight: 400;
    font-size: 26px;
    letter-spacing: 0.01em;
    flex: 1;
  }
  .card .close {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 6px;
  }
  .card .close:hover { color: var(--ink); background: rgba(138,143,163,0.14); }
  .card .fact {
    font-size: 13px;
    line-height: 1.55;
    color: var(--muted);
    margin: 8px 0 14px;
  }
  .card dl {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 7px 14px;
    font-size: 12px;
  }
  .card dt {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--faint);
    align-self: baseline;
    padding-top: 1px;
  }
  .card dd {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--ink);
    font-variant-numeric: tabular-nums;
    text-align: right;
    align-self: baseline;
  }

  .credit {
    position: absolute;
    left: clamp(18px, 3vw, 40px);
    bottom: clamp(14px, 3vh, 30px);
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.05em;
    color: var(--faint);
    max-width: 30ch;
    line-height: 1.6;
    pointer-events: none;
  }

  @media (max-width: 720px) {
    .credit { display: none; }
    .dock { padding: 10px 12px 12px; gap: 8px; }
    .card { top: auto; bottom: 120px; right: 14px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .card { transition: none; }
  }
</style>

<div class="stage">
  <canvas id="sky" aria-label="Interactive map of the solar system. Planets are drawn at their true positions for the selected date."></canvas>

  <noscript>
    <p style="position:absolute; top:20px; left:20px; color:#8a8fa3; font-family:inherit;">
      This live orrery computes planet positions in your browser and needs JavaScript enabled.
    </p>
  </noscript>

  <aside class="card" id="card" aria-live="polite">
    <div class="card-head">
      <span class="symbol" id="cardSymbol"></span>
      <h2 id="cardName"></h2>
      <button class="close" id="cardClose" aria-label="Close panel">&times;</button>
    </div>
    <p class="fact" id="cardFact"></p>
    <dl>
      <dt>From the Sun</dt><dd id="cardSunDist"></dd>
      <dt>From Earth</dt><dd id="cardEarthDist"></dd>
      <dt>Light delay</dt><dd id="cardLight"></dd>
      <dt>Longitude</dt><dd id="cardLon"></dd>
      <dt>Year length</dt><dd id="cardPeriod"></dd>
    </dl>
  </aside>

  <div class="dock" role="group" aria-label="Time controls">
    <div class="scrub-row">
      <span class="year-mark">1800</span>
      <input type="range" id="scrub" min="1800" max="2049.99" step="0.01" aria-label="Scrub through time by year">
      <span class="year-mark">2050</span>
    </div>
    <div class="controls-row">
      <button class="btn" id="todayBtn">Today</button>
      <input type="date" id="dateInput" min="1800-01-01" max="2049-12-31" aria-label="Jump to date">
      <button class="btn primary" id="playBtn" aria-pressed="false">Play</button>
      <div class="seg" id="speedSeg" role="group" aria-label="Playback speed">
        <button data-speed="1" aria-pressed="false">day/s</button>
        <button data-speed="7" aria-pressed="false">wk/s</button>
        <button data-speed="30.44" aria-pressed="true">mo/s</button>
        <button data-speed="365.25" aria-pressed="false">yr/s</button>
        <button data-speed="3652.5" aria-pressed="false">dec/s</button>
      </div>
      <div class="dock-divider"></div>
      <div class="seg views" id="viewSeg" role="group" aria-label="View">
        <button data-view="inner" aria-pressed="false">Inner</button>
        <button data-view="whole" aria-pressed="true">Whole</button>
      </div>
    </div>
  </div>

  <p class="credit">drag to pan &middot; scroll to zoom &middot; click a planet<br>Positions from JPL Keplerian elements, valid 1800&ndash;2050. Sizes not to scale.</p>
</div>

<script>
(function () {
  "use strict";

  /* ------------------------------------------------------------------ */
  /* Orbital mechanics - JPL approximate elements, J2000, rates per     */
  /* Julian century. Columns: a(AU), e, I(deg), L(deg), varpi(deg),     */
  /* Omega(deg), then the six rates.                                    */
  /* ------------------------------------------------------------------ */
  var DEG = Math.PI / 180;
  var J2000 = 2451545.0;

  var PLANETS = [
    { name: "Mercury", symbol: "☿", color: "#b8aa9d", dot: 2.6,
      period: 87.969, fact: "A year here lasts 88 days, but one full day-night cycle takes 176.",
      el: [0.38709927, 0.20563593, 7.00497902, 252.25032350, 77.45779628, 48.33076593],
      rate: [0.00000037, 0.00001906, -0.00594749, 149472.67411175, 0.16047689, -0.12534081] },
    { name: "Venus", symbol: "♀", color: "#e6c98f", dot: 4.0,
      period: 224.701, fact: "It spins backwards, so here the sun rises in the west.",
      el: [0.72333566, 0.00677672, 3.39467605, 181.97909950, 131.60246718, 76.67984255],
      rate: [0.00000390, -0.00004107, -0.00078890, 58517.81538729, 0.00268329, -0.27769418] },
    { name: "Earth", symbol: "⊕", color: "#6fa8dc", dot: 4.3,
      period: 365.256, fact: "You are here.",
      el: [1.00000261, 0.01671123, -0.00001531, 100.46457166, 102.93768193, 0.0],
      rate: [0.00000562, -0.00004392, -0.01294668, 35999.37244981, 0.32327364, 0.0] },
    { name: "Mars", symbol: "♂", color: "#d1704a", dot: 3.3,
      period: 686.980, fact: "Home to Olympus Mons, a volcano nearly three times the height of Everest.",
      el: [1.52371034, 0.09339410, 1.84969142, -4.55343205, -23.94362959, 49.55953891],
      rate: [0.00001847, 0.00007882, -0.00813131, 19140.30268499, 0.44441088, -0.29257343] },
    { name: "Jupiter", symbol: "♃", color: "#d9a76f", dot: 7.5,
      period: 4332.59, fact: "More massive than all the other planets combined, twice over.",
      el: [5.20288700, 0.04838624, 1.30439695, 34.39644051, 14.72847983, 100.47390909],
      rate: [-0.00011607, -0.00013253, -0.00183714, 3034.74612775, 0.21252668, 0.20469106] },
    { name: "Saturn", symbol: "♄", color: "#e3cf9a", dot: 6.4, ring: true,
      period: 10759.2, fact: "Its vast rings are, in places, only about ten meters thick.",
      el: [9.53667594, 0.05386179, 2.48599187, 49.95424423, 92.59887831, 113.66242448],
      rate: [-0.00125060, -0.00050991, 0.00193609, 1222.49362201, -0.41897216, -0.28867794] },
    { name: "Uranus", symbol: "⛢", color: "#9fd8d8", dot: 5.2,
      period: 30688.5, fact: "Knocked on its side long ago, it rolls around the sun like a barrel.",
      el: [19.18916464, 0.04725744, 0.77263783, 313.23810451, 170.95427630, 74.01692503],
      rate: [-0.00196176, -0.00004397, -0.00242939, 428.48202785, 0.40805281, 0.04240589] },
    { name: "Neptune", symbol: "♆", color: "#6f86d8", dot: 5.0,
      period: 60182, fact: "Winds here reach 2,000 km/h, the fastest in the solar system.",
      el: [30.06992276, 0.00859048, 1.77004347, -55.12002969, 44.96476227, 131.78422574],
      rate: [0.00026291, 0.00005105, 0.00035372, 218.45945325, -0.32241464, -0.06682744] }
  ];

  var SUN = { name: "The Sun", symbol: "☉", color: "#e2b04a",
    fact: "99.86% of everything in the solar system, holding the rest on invisible strings." };

  function normDeg(d) {
    d = d % 360;
    if (d > 180) d -= 360;
    if (d < -180) d += 360;
    return d;
  }

  function solveKepler(M, e) {
    var E = M + e * Math.sin(M);
    for (var i = 0; i < 8; i++) {
      E -= (E - e * Math.sin(E) - M) / (1 - e * Math.cos(E));
    }
    return E;
  }

  /* Heliocentric ecliptic position (AU) of planet p at Julian date jd. */
  function position(p, jd) {
    var T = (jd - J2000) / 36525;
    var a = p.el[0] + p.rate[0] * T;
    var e = p.el[1] + p.rate[1] * T;
    var I = (p.el[2] + p.rate[2] * T) * DEG;
    var L = p.el[3] + p.rate[3] * T;
    var w = p.el[4] + p.rate[4] * T;   /* varpi, longitude of perihelion */
    var O = (p.el[5] + p.rate[5] * T) * DEG;

    var M = normDeg(L - w) * DEG;
    var om = w * DEG - O;              /* argument of perihelion */
    var E = solveKepler(M, e);

    var xp = a * (Math.cos(E) - e);
    var yp = a * Math.sqrt(1 - e * e) * Math.sin(E);

    var cw = Math.cos(om), sw = Math.sin(om);
    var cO = Math.cos(O), sO = Math.sin(O);
    var cI = Math.cos(I), sI = Math.sin(I);

    return {
      x: (cw * cO - sw * sO * cI) * xp + (-sw * cO - cw * sO * cI) * yp,
      y: (cw * sO + sw * cO * cI) * xp + (-sw * sO + cw * cO * cI) * yp,
      z: (sw * sI) * xp + (cw * sI) * yp
    };
  }

  /* Full orbit path (array of {x,y}) sampled at the elements for jd. */
  function orbitPath(p, jd, n) {
    var T = (jd - J2000) / 36525;
    var a = p.el[0] + p.rate[0] * T;
    var e = p.el[1] + p.rate[1] * T;
    var I = (p.el[2] + p.rate[2] * T) * DEG;
    var w = p.el[4] + p.rate[4] * T;
    var O = (p.el[5] + p.rate[5] * T) * DEG;
    var om = w * DEG - O;
    var cw = Math.cos(om), sw = Math.sin(om);
    var cO = Math.cos(O), sO = Math.sin(O);
    var cI = Math.cos(I);
    var pts = [];
    for (var i = 0; i <= n; i++) {
      var E = (i / n) * 2 * Math.PI;
      var xp = a * (Math.cos(E) - e);
      var yp = a * Math.sqrt(1 - e * e) * Math.sin(E);
      pts.push({
        x: (cw * cO - sw * sO * cI) * xp + (-sw * cO - cw * sO * cI) * yp,
        y: (cw * sO + sw * cO * cI) * xp + (-sw * sO + cw * cO * cI) * yp
      });
    }
    return pts;
  }

  /* ------------------------------------------------------------------ */
  /* Time state                                                          */
  /* ------------------------------------------------------------------ */
  function jdFromDate(date) { return date.getTime() / 86400000 + 2440587.5; }
  function dateFromJd(jd) { return new Date((jd - 2440587.5) * 86400000); }
  function jdFromYearStart(y) { return Date.UTC(y, 0, 1) / 86400000 + 2440587.5; }

  var JD_MIN = jdFromYearStart(1800);
  var JD_MAX = jdFromYearStart(2050) - 1;

  var reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  var state = {
    jd: jdFromDate(new Date()),
    playing: !reducedMotion,
    speed: 30.44,            /* days per real second */
    scale: 10,               /* px per AU (set on resize) */
    scaleTarget: 10,
    cxAU: 0, cyAU: 0,        /* world coords at screen center */
    selected: null,          /* planet object, SUN, or null */
    hovered: null
  };

  /* ------------------------------------------------------------------ */
  /* Canvas setup                                                        */
  /* ------------------------------------------------------------------ */
  var canvas = document.getElementById("sky");
  var ctx = canvas.getContext("2d");
  var dpr = 1, W = 0, H = 0;

  var starCanvas = null;

  function makeStars() {
    starCanvas = document.createElement("canvas");
    starCanvas.width = Math.ceil(W * dpr);
    starCanvas.height = Math.ceil(H * dpr);
    var sc = starCanvas.getContext("2d");
    sc.scale(dpr, dpr);
    var n = Math.round((W * H) / 3200);
    for (var i = 0; i < n; i++) {
      var x = Math.random() * W, y = Math.random() * H;
      var m = Math.random();
      var r = m > 0.97 ? 1.3 : m > 0.8 ? 0.9 : 0.55;
      var alpha = m > 0.97 ? 0.85 : 0.18 + Math.random() * 0.4;
      sc.beginPath();
      sc.arc(x, y, r, 0, 2 * Math.PI);
      sc.fillStyle = "rgba(222, 226, 240, " + alpha.toFixed(2) + ")";
      sc.fill();
    }
  }

  function fitScale(auRadius) {
    return (Math.min(W, H) / 2 - 46) / auRadius;
  }

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = Math.ceil(W * dpr);
    canvas.height = Math.ceil(H * dpr);
    canvas.style.width = W + "px";
    canvas.style.height = H + "px";
    makeStars();
    var whole = fitScale(31.5);
    if (state.scale === 10) { state.scale = whole; state.scaleTarget = whole; }
    draw();
  }

  function toScreen(x, y) {
    return {
      x: W / 2 + (x - state.cxAU) * state.scale,
      y: H / 2 - (y - state.cyAU) * state.scale
    };
  }

  /* ------------------------------------------------------------------ */
  /* Drawing                                                             */
  /* ------------------------------------------------------------------ */
  var cachedPaths = null, cachedPathJd = -1e9;

  function getPaths() {
    if (!cachedPaths || Math.abs(state.jd - cachedPathJd) > 9131) { /* ~25 yr */
      cachedPaths = PLANETS.map(function (p) { return orbitPath(p, state.jd, 240); });
      cachedPathJd = state.jd;
    }
    return cachedPaths;
  }

  function draw() {
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.fillStyle = "#05070d";
    ctx.fillRect(0, 0, W, H);
    if (starCanvas) ctx.drawImage(starCanvas, 0, 0, W, H);

    var paths = getPaths();
    var positions = PLANETS.map(function (p) { return position(p, state.jd); });
    var sun = toScreen(0, 0);

    /* AU distance ticks along +x axis */
    ctx.font = "10px " + '"SF Mono", Menlo, ui-monospace, monospace';
    ctx.textAlign = "left";
    ctx.textBaseline = "middle";
    [1, 5, 10, 20, 30].forEach(function (au) {
      var px = au * state.scale;
      if (px < 60 || px > Math.max(W, H) * 1.4) return;
      var tx = sun.x + px, ty = sun.y;
      if (tx < -20 || tx > W + 20 || ty < -10 || ty > H + 10) return;
      ctx.strokeStyle = "rgba(138,143,163,0.35)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(tx, ty - 4);
      ctx.lineTo(tx, ty + 4);
      ctx.stroke();
      ctx.fillStyle = "rgba(138,143,163,0.5)";
      ctx.fillText(au + " AU", tx + 5, ty);
    });

    /* orbits */
    for (var i = 0; i < PLANETS.length; i++) {
      var isSel = state.selected === PLANETS[i];
      var isHov = state.hovered === PLANETS[i];
      ctx.strokeStyle = isSel || isHov
        ? "rgba(233, 229, 214, 0.40)"
        : "rgba(138, 143, 163, 0.20)";
      ctx.lineWidth = isSel ? 1.4 : 1;
      ctx.beginPath();
      var pts = paths[i];
      for (var j = 0; j < pts.length; j++) {
        var s = toScreen(pts[j].x, pts[j].y);
        if (j === 0) ctx.moveTo(s.x, s.y); else ctx.lineTo(s.x, s.y);
      }
      ctx.stroke();
    }

    /* sun */
    var sunHL = state.selected === SUN || state.hovered === SUN;
    var g = ctx.createRadialGradient(sun.x, sun.y, 0, sun.x, sun.y, 42);
    g.addColorStop(0, "rgba(226, 176, 74, 0.55)");
    g.addColorStop(1, "rgba(226, 176, 74, 0)");
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(sun.x, sun.y, 42, 0, 2 * Math.PI);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(sun.x, sun.y, sunHL ? 11 : 10, 0, 2 * Math.PI);
    ctx.fillStyle = "#f3cd7a";
    ctx.fill();

    /* trailing arcs + planets */
    for (var k = 0; k < PLANETS.length; k++) {
      var p = PLANETS[k];
      var pos = positions[k];
      var sp = toScreen(pos.x, pos.y);

      /* short motion trail: recent 1/14 of the orbit */
      var steps = 15;
      ctx.lineCap = "round";
      var prev = sp;
      for (var t = 1; t <= steps; t++) {
        var past = position(p, state.jd - (p.period / 14) * (t / steps));
        var ps = toScreen(past.x, past.y);
        ctx.strokeStyle = hexA(p.color, 0.36 * (1 - t / steps));
        ctx.lineWidth = 1.6;
        ctx.beginPath();
        ctx.moveTo(prev.x, prev.y);
        ctx.lineTo(ps.x, ps.y);
        ctx.stroke();
        prev = ps;
      }

      var hl = state.selected === p || state.hovered === p;

      if (hl) {
        ctx.beginPath();
        ctx.arc(sp.x, sp.y, p.dot + 6, 0, 2 * Math.PI);
        ctx.strokeStyle = "rgba(233,229,214,0.6)";
        ctx.lineWidth = 1;
        ctx.stroke();
      }

      if (p.ring) {
        ctx.save();
        ctx.translate(sp.x, sp.y);
        ctx.rotate(-0.35);
        ctx.beginPath();
        ctx.ellipse(0, 0, p.dot + 5.5, (p.dot + 5.5) * 0.36, 0, 0, 2 * Math.PI);
        ctx.strokeStyle = hexA(p.color, 0.75);
        ctx.lineWidth = 1.4;
        ctx.stroke();
        ctx.restore();
      }

      ctx.beginPath();
      ctx.arc(sp.x, sp.y, p.dot, 0, 2 * Math.PI);
      ctx.fillStyle = p.color;
      ctx.fill();

      /* label: skip when crowded near the sun, unless highlighted */
      var orbitPx = Math.hypot(sp.x - sun.x, sp.y - sun.y);
      if (orbitPx > 46 || hl) {
        ctx.font = "10.5px " + '"SF Mono", Menlo, ui-monospace, monospace';
        ctx.textAlign = "left";
        ctx.textBaseline = "middle";
        ctx.fillStyle = hl ? "rgba(233,229,214,0.95)" : "rgba(138,143,163,0.78)";
        ctx.fillText(p.name.toUpperCase(), sp.x + p.dot + 7, sp.y);
      }

      p._sx = sp.x; p._sy = sp.y; p._pos = pos;
    }
    SUN._sx = sun.x; SUN._sy = sun.y;
  }

  function hexA(hex, a) {
    var r = parseInt(hex.slice(1, 3), 16),
        g = parseInt(hex.slice(3, 5), 16),
        b = parseInt(hex.slice(5, 7), 16);
    return "rgba(" + r + "," + g + "," + b + "," + a.toFixed(3) + ")";
  }

  /* ------------------------------------------------------------------ */
  /* HUD                                                                 */
  /* ------------------------------------------------------------------ */
  var scrub = document.getElementById("scrub");
  var dateInput = document.getElementById("dateInput");
  var playBtn = document.getElementById("playBtn");
  var card = document.getElementById("card");

  var MONTHS = ["Jan", "Feb", "Mar", "Apr", "May", "Jun",
                "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

  function pad(n) { return n < 10 ? "0" + n : "" + n; }

  function yearFloat(jd) {
    var d = dateFromJd(jd);
    var y = d.getUTCFullYear();
    var start = jdFromYearStart(y), end = jdFromYearStart(y + 1);
    return y + (jd - start) / (end - start);
  }

  function updateHud() {
    var d = dateFromJd(state.jd);
    var iso = d.getUTCFullYear() + "-" + pad(d.getUTCMonth() + 1) + "-" + pad(d.getUTCDate());
    if (document.activeElement !== dateInput) dateInput.value = iso;
    if (document.activeElement !== scrub) scrub.value = yearFloat(state.jd).toFixed(2);
    if (state.selected) updateCard();
  }

  function fmtAU(au) { return au.toFixed(3) + " AU"; }

  function fmtLight(au) {
    var min = au * 8.3167;
    if (min < 1) return (min * 60).toFixed(0) + " light-sec";
    if (min < 90) return min.toFixed(1) + " light-min";
    return (min / 60).toFixed(2) + " light-hr";
  }

  function fmtPeriod(days) {
    if (days < 1000) return days.toFixed(0) + " days";
    return (days / 365.256).toFixed(1) + " years";
  }

  function updateCard() {
    var sel = state.selected;
    document.getElementById("cardSymbol").textContent = sel.symbol;
    document.getElementById("cardSymbol").style.color = sel.color;
    document.getElementById("cardName").textContent = sel.name;
    document.getElementById("cardFact").textContent = sel.fact;

    var dl = card.querySelector("dl");
    if (sel === SUN) { dl.style.display = "none"; return; }
    dl.style.display = "grid";

    var pos = position(sel, state.jd);
    var e = position(PLANETS[2], state.jd);
    var rSun = Math.hypot(pos.x, pos.y, pos.z);
    var rEarth = sel === PLANETS[2]
      ? Math.hypot(pos.x, pos.y, pos.z)   /* Earth: show sun distance twice? no - handled below */
      : Math.hypot(pos.x - e.x, pos.y - e.y, pos.z - e.z);
    var lon = Math.atan2(pos.y, pos.x) / DEG;
    if (lon < 0) lon += 360;

    document.getElementById("cardSunDist").textContent = fmtAU(rSun);
    if (sel === PLANETS[2]) {
      document.getElementById("cardEarthDist").textContent = "0 (home)";
      document.getElementById("cardLight").textContent = fmtLight(rSun) + " from sun";
    } else {
      document.getElementById("cardEarthDist").textContent = fmtAU(rEarth);
      document.getElementById("cardLight").textContent = fmtLight(rEarth);
    }
    document.getElementById("cardLon").textContent = lon.toFixed(1) + "°";
    document.getElementById("cardPeriod").textContent = fmtPeriod(sel.period);
  }

  function select(obj) {
    state.selected = obj;
    if (obj) { updateCard(); card.classList.add("open"); }
    else card.classList.remove("open");
  }

  document.getElementById("cardClose").addEventListener("click", function () { select(null); });

  /* ------------------------------------------------------------------ */
  /* Controls                                                            */
  /* ------------------------------------------------------------------ */
  function setPlaying(on) {
    state.playing = on;
    playBtn.textContent = on ? "Pause" : "Play";
    playBtn.setAttribute("aria-pressed", String(on));
  }
  playBtn.addEventListener("click", function () { setPlaying(!state.playing); });
  setPlaying(state.playing);

  document.getElementById("todayBtn").addEventListener("click", function () {
    state.jd = jdFromDate(new Date());
    updateHud();
  });

  scrub.addEventListener("input", function () {
    var y = parseFloat(scrub.value);
    var yi = Math.floor(y);
    state.jd = jdFromYearStart(yi) + (y - yi) * (jdFromYearStart(yi + 1) - jdFromYearStart(yi));
    updateHud();
  });

  dateInput.addEventListener("change", function () {
    var parts = dateInput.value.split("-");
    if (parts.length !== 3) return;
    var jd = Date.UTC(+parts[0], +parts[1] - 1, +parts[2]) / 86400000 + 2440587.5;
    if (jd >= JD_MIN && jd <= JD_MAX) { state.jd = jd; updateHud(); }
  });

  var speedSeg = document.getElementById("speedSeg");
  speedSeg.addEventListener("click", function (ev) {
    var b = ev.target.closest("button");
    if (!b) return;
    state.speed = parseFloat(b.dataset.speed);
    speedSeg.querySelectorAll("button").forEach(function (x) {
      x.setAttribute("aria-pressed", String(x === b));
    });
  });

  var viewSeg = document.getElementById("viewSeg");
  function setView(v) {
    state.scaleTarget = v === "inner" ? fitScale(1.9) : fitScale(31.5);
    state.animPan = true;
    viewSeg.querySelectorAll("button").forEach(function (x) {
      x.setAttribute("aria-pressed", String(x.dataset.view === v));
    });
  }
  viewSeg.addEventListener("click", function (ev) {
    var b = ev.target.closest("button");
    if (b) setView(b.dataset.view);
  });

  /* ------------------------------------------------------------------ */
  /* Pointer interaction                                                 */
  /* ------------------------------------------------------------------ */
  var pointers = new Map();
  var dragMoved = 0;
  var pinchStart = null;

  function pickAt(mx, my) {
    var best = null, bestD = 16;
    for (var i = 0; i < PLANETS.length; i++) {
      var d = Math.hypot(PLANETS[i]._sx - mx, PLANETS[i]._sy - my);
      if (d < bestD) { bestD = d; best = PLANETS[i]; }
    }
    var ds = Math.hypot(SUN._sx - mx, SUN._sy - my);
    if (ds < bestD && ds < 18) best = SUN;
    return best;
  }

  canvas.addEventListener("pointerdown", function (ev) {
    canvas.setPointerCapture(ev.pointerId);
    pointers.set(ev.pointerId, { x: ev.clientX, y: ev.clientY });
    dragMoved = 0;
    state.animPan = false;
    if (pointers.size === 2) {
      var pts = Array.from(pointers.values());
      pinchStart = {
        dist: Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y),
        scale: state.scale
      };
    }
    canvas.classList.add("dragging");
  });

  canvas.addEventListener("pointermove", function (ev) {
    if (!pointers.has(ev.pointerId)) {
      var h = pickAt(ev.clientX, ev.clientY);
      if (h !== state.hovered) {
        state.hovered = h;
        canvas.classList.toggle("hovering", !!h);
      }
      return;
    }
    var prev = pointers.get(ev.pointerId);
    var dx = ev.clientX - prev.x, dy = ev.clientY - prev.y;
    pointers.set(ev.pointerId, { x: ev.clientX, y: ev.clientY });
    dragMoved += Math.abs(dx) + Math.abs(dy);

    if (pointers.size === 1) {
      state.cxAU -= dx / state.scale;
      state.cyAU += dy / state.scale;
    } else if (pointers.size === 2 && pinchStart) {
      var pts = Array.from(pointers.values());
      var d = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
      var ns = clampScale(pinchStart.scale * d / pinchStart.dist);
      state.scale = ns;
      state.scaleTarget = ns;
    }
  });

  function endPointer(ev) {
    var was = pointers.has(ev.pointerId);
    pointers.delete(ev.pointerId);
    if (pointers.size < 2) pinchStart = null;
    if (pointers.size === 0) canvas.classList.remove("dragging");
    if (was && dragMoved < 6 && pointers.size === 0) {
      select(pickAt(ev.clientX, ev.clientY));
    }
  }
  canvas.addEventListener("pointerup", endPointer);
  canvas.addEventListener("pointercancel", endPointer);

  function clampScale(s) {
    return Math.max(fitScale(45), Math.min(fitScale(0.08), s));
  }

  canvas.addEventListener("wheel", function (ev) {
    ev.preventDefault();
    var factor = Math.exp(-ev.deltaY * 0.0016);
    var ns = clampScale(state.scale * factor);
    factor = ns / state.scale;
    /* keep the world point under the cursor fixed */
    var wx = state.cxAU + (ev.clientX - W / 2) / state.scale;
    var wy = state.cyAU - (ev.clientY - H / 2) / state.scale;
    state.scale = ns;
    state.scaleTarget = ns;
    state.cxAU = wx - (ev.clientX - W / 2) / state.scale;
    state.cyAU = wy + (ev.clientY - H / 2) / state.scale;
    state.animPan = false;
  }, { passive: false });

  canvas.addEventListener("dblclick", function () { setView("whole"); });

  window.addEventListener("keydown", function (ev) {
    if (ev.target !== document.body) return;
    if (ev.key === " ") { ev.preventDefault(); setPlaying(!state.playing); }
    if (ev.key === "Escape") select(null);
  });

  /* ------------------------------------------------------------------ */
  /* Main loop                                                           */
  /* ------------------------------------------------------------------ */
  var lastT = performance.now();
  var hudT = 0;

  function frame(now) {
    var dt = Math.min((now - lastT) / 1000, 0.1);
    lastT = now;

    if (state.playing) {
      state.jd += state.speed * dt;
      if (state.jd >= JD_MAX) { state.jd = JD_MAX; setPlaying(false); }
      if (state.jd <= JD_MIN) { state.jd = JD_MIN; setPlaying(false); }
    }

    /* eased zoom for preset buttons */
    var k = 1 - Math.exp(-dt * 7);
    if (Math.abs(state.scaleTarget - state.scale) > 0.0001 * state.scale) {
      state.scale += (state.scaleTarget - state.scale) * k;
    }
    if (state.animPan) {
      state.cxAU += (0 - state.cxAU) * k;
      state.cyAU += (0 - state.cyAU) * k;
    }

    draw();

    hudT += dt;
    if (hudT > 0.15) { hudT = 0; updateHud(); }

    requestAnimationFrame(frame);
  }

  window.addEventListener("resize", resize);
  resize();
  updateHud();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
