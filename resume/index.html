<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Resume — Saw Thura Zaw</title>
<meta name="description" content="Resume of Saw Thura Zaw (irrssue).">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<script>
  // Apply dark mode class as early as possible to prevent flash (matches every other page)
  (function() {
    const isMobile = window.innerWidth <= 768;
    const shouldUseDarkMode = isMobile
      ? window.matchMedia('(prefers-color-scheme: dark)').matches
      : localStorage.getItem('darkMode') !== 'false';
    if (shouldUseDarkMode) {
      document.documentElement.classList.add('dark-mode-preload');
    }
  })();
</script>
<style>
  :root{
    --bg:#ffffff;
    --fg:#2b2926;
    --dim:#6b655c;
    --line:rgba(43,41,38,0.13);
    --accent:oklch(0.6 0.125 58);
  }
  html.dark-mode-preload,
  body.dark-mode{
    --bg:#000000;
    --fg:#f3efe8;
    --dim:#8b847a;
    --line:rgba(243,239,232,0.11);
    --accent:oklch(0.74 0.125 58);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:var(--bg);
    color:var(--fg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:flex;
    flex-direction:column;
    min-height:100%;
  }
  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:1rem;
    padding:0.9rem 1.25rem;
    border-bottom:1px solid var(--line);
  }
  header .title{font-size:0.95rem;font-weight:500;}
  header .title a{color:var(--dim);text-decoration:none;}
  header .title a:hover{color:var(--fg);}
  header .actions a{
    color:var(--accent);
    text-decoration:none;
    font-size:0.9rem;
    font-weight:500;
  }
  header .actions a:hover{text-decoration:underline;}
  main{flex:1 1 auto;min-height:0;}
  .viewer{width:100%;height:100%;border:0;display:block;}
  .fallback{
    padding:2rem 1.25rem;
    text-align:center;
    color:var(--dim);
    font-size:0.95rem;
  }
  .fallback a{color:var(--accent);}
</style>
</head>
<body>
  <header>
    <div class="title"><a href="/">← irrssue.com</a></div>
    <div class="actions"><a href="/resume/resume.pdf" download="Saw-Thura-Zaw-Resume.pdf">Download PDF</a></div>
  </header>
  <main>
    <object class="viewer" data="/resume/resume.pdf" type="application/pdf">
      <div class="fallback">
        Your browser can't display the PDF inline.
        <a href="/resume/resume.pdf">Open the resume PDF</a> instead.
      </div>
    </object>
  </main>
</body>
</html>
